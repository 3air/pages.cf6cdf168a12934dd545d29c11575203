<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>THREE AIR</title>
    <style>
      @keyframes Slide {
        25% {
          left: -125%;
        }
        75% {
          left: 125%;
        }
      }
      @keyframes Opacity {
        50% {
          opacity: 0.25;
        }
      }

      * {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: YuMincho, serif;
        font-weight: 600;
        color: #fff;
        background-color: #1d2a33;
        letter-spacing: 0.5rem;
        text-align: center;
      }
      .container {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
      }
      .title {
        position: relative;
        display: block;
        overflow: hidden;
        opacity: 1;
        animation: Opacity 5000ms ease-in-out infinite;
      }
      .title hr {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        border-width: 1px;
        box-sizing: border-box;
        animation: Slide 7500ms ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="title">
        <h1>THREE AIR</h1>
        <hr />
      </div>
    </div>
  </body>
</html>
